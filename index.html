    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://maigia.tech" />

    <!-- ── Open Graph (LinkedIn, WhatsApp, Facebook) ── -->

    <meta property="og:url" content="https://maigia.tech" />
    <meta property="og:title" content="MAIGIA — AI Agency for Extraordinary Experiences" />

    <!-- ── Twitter / X Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://maigia.tech" />
    <meta name="twitter:title" content="MAIGIA — AI Agency for Extraordinary Experiences" />
    <meta name="twitter:description" content="Avatares IA conversacionales, instalaciones interactivas, producción audiovisual con IA y soluciones digitales para eventos, marcas y cultura." />
    <meta name="twitter:image" content="https://maigia.tech/MAIGIA-LOGO-V1.png" />

    <!-- ── Schema.org JSON-LD (Google + LLMs) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "MAIGIA",
      "alternateName": ["Maigia AI", "MAIGIA Agency"],
      "url": "https://maigia.tech",
      "logo": "https://maigia.tech/MAIGIA-LOGO-V1.png",
      "description": "MAIGIA es una AI Agency especializada en experiencias extraordinarias: avatares IA conversacionales, instalaciones interactivas con inteligencia artificial, producción audiovisual generativa y soluciones digitales para eventos, marcas y cultura. Nace de la unión entre Girasomnis, estudio creativo con más de 20 años de experiencia, e Immerso, especialista en desarrollo de software y avatares 3D en tiempo real.",
      "foundingDate": "2024",
      "founders": [
        { "@type": "Person", "name": "Paco Gramaje" },
        { "@type": "Person", "name": "Leonardo Bautista" },
        { "@type": "Person", "name": "Anto Loriso" },
        { "@type": "Person", "name": "Martin Julià" }
      ],
      "areaServed": {
        "@type": "Country",
        "name": "España"
      },
      "location": [
        { "@type": "Place", "name": "Madrid, España" },
        { "@type": "Place", "name": "Valencia, España" },
        { "@type": "Place", "name": "Barcelona, España" }
      ],
      "sameAs": [
        "https://www.linkedin.com/company/girasomnis/",
        "https://www.instagram.com/aiasomnis",
        "https://www.youtube.com/@PacoGramajegirasomnis",
        "https://immerso.live"
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Servicios MAIGIA",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Avatares IA Conversacionales",
              "description": "Avatares de inteligencia artificial para eventos, ferias y espacios físicos. Atienden al público, presentan contenidos, responden preguntas en varios idiomas y captan leads en tiempo real."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Instalaciones Interactivas con IA",
              "description": "Experiencias donde el público interactúa con cámaras, pantallas, sensores y sistemas generativos, creando contenido visual en tiempo real."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Producción Audiovisual con IA",
              "description": "Imágenes, animaciones y mundos visuales con IA: dirección artística, 3D, motion graphics, videomapping y producción audiovisual profesional."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Soluciones Digitales con IA",
              "description": "Webs con IA, asistentes virtuales, automatización de procesos, CRM integration y experiencias 3D web para empresas."
            }
          }
        ]
      }
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Netlify Forms detection: hidden form mirrors the React modal form -->
    <form name="contacto-aiasomnis" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="contacto-aiasomnis" />
      <input name="nombre" />
      <input name="email" type="email" />
      <select name="tipo"></select>
      <textarea name="mensaje"></textarea>
    </form>
  </body>
